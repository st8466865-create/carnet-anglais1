    "engine oil|huile moteur,spark plug|bougie d'allumage,chain|chaîne,clutch|embrayage,gear|vitesse,gearbox|boîte de vitesses,exhaust pipe|pot d'échappement,carburetor|carburateur,moto battery|batterie de moto,headlight|phare,taillight|feu arrière,horn|klaxon,side mirror|rétroviseur,kickstand|béquille,handlebar|guidon,wheel|roue,puncture|crevaison,mechanic shop|garage,spare part|pièce de rechange,tool|outil,wrench|clé (outil),screwdriver|tournevis,to start the engine|démarrer le moteur,to check the oil|vérifier l'huile,flat tire|pneu à plat,brake pad|plaquette de frein,fuel tank|réservoir d'essence,top speed|vitesse maximale,accident|accident,license plate|plaque d'immatriculation,insurance papers|papiers d'assurance,registration card|carte grise,mileage|kilométrage,to overheat|surchauffer,to break down|tomber en panne,to tighten|serrer,to loosen|desserrer",
};

const PATTERNS = [
  { en: "I want to", fr: "Je veux" },
  { en: "I don't want to", fr: "Je ne veux pas" },
  { en: "I need to", fr: "J'ai besoin de" },
  { en: "I would like to", fr: "J'aimerais" },
  { en: "I have to", fr: "Je dois" },
  { en: "I don't have to", fr: "Je n'ai pas à" },
  { en: "I can", fr: "Je peux" },
  { en: "I can't", fr: "Je ne peux pas" },
  { en: "I could", fr: "Je pourrais" },
  { en: "I am going to", fr: "Je vais" },
  { en: "I was going to", fr: "J'allais" },
  { en: "I have already", fr: "J'ai déjà" },
  { en: "I haven't yet", fr: "Je n'ai pas encore" },
  { en: "I used to", fr: "Avant, j'avais l'habitude de" },
  { en: "I should", fr: "Je devrais" },
  { en: "I shouldn't", fr: "Je ne devrais pas" },
  { en: "I must", fr: "Je dois absolument" },
  { en: "I mustn't", fr: "Je ne dois surtout pas" },
  { en: "It's time to", fr: "Il est temps de" },
  { en: "I'm trying to", fr: "J'essaie de" },
  { en: "I forgot to", fr: "J'ai oublié de" },
  { en: "I remember to", fr: "Je me souviens de" },
  { en: "I'm afraid to", fr: "J'ai peur de" },
  { en: "I'm happy to", fr: "Je suis content de" },
  { en: "I hope to", fr: "J'espère" },
  { en: "I plan to", fr: "Je prévois de" },
  { en: "I decided to", fr: "J'ai décidé de" },
  { en: "I'm learning to", fr: "J'apprends à" },
  { en: "I know how to", fr: "Je sais comment" },
  { en: "I don't know how to", fr: "Je ne sais pas comment" },
  { en: "It's easy to", fr: "C'est facile de" },
  { en: "It's difficult to", fr: "C'est difficile de" },
  { en: "I prefer to", fr: "Je préfère" },
  { en: "Can you", fr: "Peux-tu" },
  { en: "Could you", fr: "Pourrais-tu" },
  { en: "Would you like to", fr: "Voudrais-tu" },
  { en: "Do you want to", fr: "Veux-tu" },
];

const BUILDER_VERBS = [
  "go", "eat", "sleep", "work", "study", "play", "buy", "sell", "speak English",
  "learn English", "help you", "see you", "make food", "take a taxi", "give money",
  "come here", "leave now", "stay home", "drive the car", "cook rice", "clean the house",
  "read this book", "write a message", "watch the match", "listen to music", "dance",
  "sing", "swim", "run", "walk", "drink water", "pay", "call you", "wait", "finish this",
  "start now", "open the door", "close the shop", "use my phone", "try again", "understand this",
];

const BUILDER_OBJECTS = ["", "today", "tomorrow", "with you", "right now", "this evening", "before Friday"];
</script>

<script>
// --------------------------------------------------------------------------
// Parsing des données
// --------------------------------------------------------------------------
function parseCategory(raw) {
  return raw.split(",").map((pair) => {
    const [en, fr] = pair.split("|");
    return { en, fr };
  }).filter((x) => x.en && x.fr);
}

const CATEGORIES = Object.keys(RAW).map((id) => ({
  id,
  title: TITLES[id],
  words: parseCategory(RAW[id]),
}));

const ALL_WORDS = CATEGORIES.flatMap((c) => c.words.map((w) => ({ ...w, cat: c.id })));

// --------------------------------------------------------------------------
// Utilitaires
// --------------------------------------------------------------------------
function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text.replace(/^to\s+/i, ""));
    utter.lang = "en-US";
    utter.rate = 0.9;
    window.speechSynthesis.speak(utter);
  } catch (e) {}
}

function el(tag, attrs, children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === "class") node.className = attrs[k];
      else if (k === "text") node.textContent = attrs[k];
      else if (k === "html") node.innerHTML = attrs[k];
      else if (k.startsWith("on") && typeof attrs[k] === "function") node.addEventListener(k.slice(2), attrs[k]);
      else node.setAttribute(k, attrs[k]);
    }
  }
  (children || []).forEach((c) => { if (c) node.appendChild(c); });
  return node;
}

function speakBtn(text, small) {
  const b = el("button", { class: "speak-btn" + (small ? " small" : ""), text: "🔊", "aria-label": "Écouter" });
  b.addEventListener("click", (e) => { e.stopPropagation(); speak(text); });
  return b;
}

// --------------------------------------------------------------------------
// Progression (quiz scores) — stockée en local
// --------------------------------------------------------------------------
const PROGRESS_KEY = "carnet-anglais-v2-progress";
let progress = {};

async function loadProgress() {
  try {
    const res = await window.storage.get(PROGRESS_KEY);
    progress = res ? JSON.parse(res.value) : {};
  } catch (e) { progress = {}; }
}

async function saveProgress() {
  try { await window.storage.set(PROGRESS_KEY, JSON.stringify(progress)); } catch (e) {}
}

function recordAnswer(catId, correct) {
  const cur = progress[catId] || { correct: 0, attempts: 0 };
  progress[catId] = { correct: cur.correct + (correct ? 1 : 0), attempts: cur.attempts + 1 };
  saveProgress();
}

function stampNode(catId) {
  const stats = progress[catId];
  if (!stats || !stats.attempts) return null;
  const pct = Math.round((stats.correct / stats.attempts) * 100);
  const stamp = el("div", { class: "stamp" + (pct < 70 ? " low" : ""), text: pct + "%" });
  return stamp;
}

// --------------------------------------------------------------------------
// Navigation / state
// --------------------------------------------------------------------------
const root = document.getElementById("root");
let state = { screen: "home", catId: null, search: "" };

function navigate(screen, catId) {
  state = { screen, catId: catId || null, search: state.search };
  render();
  window.scrollTo(0, 0);
}

function render() {
  root.innerHTML = "";
  const wrap = el("div", { class: "notebook" });
  wrap.appendChild(el("div", { class: "margin-line" }));

  if (state.screen === "home") wrap.appendChild(renderHome());
  else if (state.screen === "flash") wrap.appendChild(renderFlashcards(state.catId));
  else if (state.screen === "quiz") wrap.appendChild(renderQuiz(state.catId));
  else if (state.screen === "builder") wrap.appendChild(renderBuilder());

  root.appendChild(wrap);
}

function topBar(title, onBack) {
  const bar = el("div", { style: "display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;" });
  const back = el("button", { class: "ghost-btn", style: "padding:6px 12px;font-size:13px;", text: "← Carnet" });
  back.addEventListener("click", onBack);
  const titleEl = el("div", { class: "hand", style: "font-size:17px;font-weight:700;color:#1B2A4A;", text: title });
  bar.appendChild(back);
  bar.appendChild(titleEl);
  bar.appendChild(el("div", { style: "width:70px;" }));
  return bar;
}

// --------------------------------------------------------------------------
// Écran Accueil
// --------------------------------------------------------------------------
function renderHome() {
  const c = el("div", { style: "padding:24px 20px 14px 58px;" });
  c.appendChild(el("div", { class: "hand", style: "font-size:28px;font-weight:700;color:#1B2A4A;transform:rotate(-1.5deg);", text: "Mon carnet d'anglais" }));
  c.appendChild(el("div", { style: "font-size:13px;color:#5b4a35;margin-top:4px;", text: `${ALL_WORDS.length}+ mots et ${PATTERNS.length} structures — méthode par blocs, comme Michel Thomas.` }));

  const searchInput = el("input", { type: "text", placeholder: "Chercher un mot (ex : maison, to go...)", style: "margin-top:12px;" });
  searchInput.value = state.search;
  const resultsBox = el("div", { class: "search-results hidden" });

  function updateSearch() {
    const q = searchInput.value.trim().toLowerCase();
    state.search = searchInput.value;
    resultsBox.innerHTML = "";
    if (q.length < 2) { resultsBox.classList.add("hidden"); return; }
    const results = ALL_WORDS.filter((w) => w.en.toLowerCase().includes(q) || w.fr.toLowerCase().includes(q)).slice(0, 30);
    if (results.length === 0) { resultsBox.classList.add("hidden"); return; }
    resultsBox.classList.remove("hidden");
    results.forEach((w) => {
      const row = el("div", { class: "search-row" });
      row.appendChild(el("span", { html: `<strong>${w.en}</strong> — ${w.fr}` }));
      row.appendChild(speakBtn(w.en, true));
      resultsBox.appendChild(row);
    });
  }
  searchInput.addEventListener("input", updateSearch);

  c.appendChild(searchInput);
  c.appendChild(resultsBox);
  updateSearch();

  const actions = el("div", { style: "padding:10px 0 0;display:flex;gap:8px;flex-wrap:wrap;" });
  const builderBtn = el("button", { class: "primary-btn", style: "font-size:13.5px;padding:9px 14px;", text: "🧩 Constructeur de phrases" });
  builderBtn.addEventListener("click", () => navigate("builder"));
  const quizAllBtn = el("button", { class: "ghost-btn", text: "Quiz général (tout mélangé)" });
  quizAllBtn.addEventListener("click", () => navigate("quiz", "__all__"));
  actions.appendChild(builderBtn);
  actions.appendChild(quizAllBtn);
  c.appendChild(actions);

  const wrapper = el("div", {});
  wrapper.appendChild(c);

  const list = el("div", { style: "border-top:1px dashed rgba(27,42,74,0.25);max-height:380px;overflow-y:auto;" });
  CATEGORIES.forEach((cat, i) => {
    const row = el("div", { class: "cat-row" });
    const header = el("div", { class: "tab-btn" });
    header.appendChild(el("span", { class: "hand", style: "color:#C0392B;font-weight:700;font-size:14px;", text: String(i + 1).padStart(2, "0") }));
    const info = el("div", {});
    info.appendChild(el("div", { text: cat.title }));
    info.appendChild(el("div", { style: "font-weight:400;font-size:12px;color:#5b4a35;", text: cat.words.length + " mots" }));
    header.appendChild(info);
    row.appendChild(header);

    const actionsRow = el("div", { class: "cat-actions" });
    const fichesBtn = el("button", { class: "primary-btn", style: "padding:7px 12px;font-size:13px;", text: "Fiches" });
    fichesBtn.addEventListener("click", () => navigate("flash", cat.id));
    const quizBtn = el("button", { class: "ghost-btn", text: "Quiz" });
    quizBtn.addEventListener("click", () => navigate("quiz", cat.id));
    actionsRow.appendChild(fichesBtn);
    actionsRow.appendChild(quizBtn);
    const stamp = stampNode(cat.id);
    if (stamp) actionsRow.appendChild(stamp);
    row.appendChild(actionsRow);

    list.appendChild(row);
  });
  wrapper.appendChild(list);

  wrapper.appendChild(el("div", {
    style: "padding:14px 20px 20px 58px;font-size:11.5px;color:#8a7455;",
    text: "Astuce Michel Thomas : ne mémorise pas par cœur — combine les blocs (« I want to » + un verbe) pour produire toi-même des phrases."
  }));

  return wrapper;
}

// --------------------------------------------------------------------------
// Écran Fiches (flashcards)
// --------------------------------------------------------------------------
function renderFlashcards(catId) {
  const category = CATEGORIES.find((c) => c.id === catId);
  let idx = 0;
  let flipped = false;

  const c = el("div", { class: "ruled", style: "padding:20px 20px 24px 58px;min-height:660px;display:flex;flex-direction:column;" });
  c.appendChild(topBar(category.title, () => navigate("home")));
  const counter = el("div", { style: "font-size:13px;color:#5b4a35;margin-bottom:10px;" });
  c.appendChild(counter);

  const cardWrap = el("div", { class: "flip-card" });
  const cardInner = el("div", { class: "flip-inner" });
  const front = el("div", { class: "face front" });
  const back = el("div", { class: "face back" });
  cardInner.appendChild(front);
  cardInner.appendChild(back);
  cardWrap.appendChild(cardInner);
  cardWrap.addEventListener("click", () => { flipped = !flipped; cardInner.classList.toggle("flipped", flipped); });
  c.appendChild(cardWrap);

  function updateCard() {
    const item = category.words[idx];
    counter.textContent = `Carte ${idx + 1} / ${category.words.length} — touche la carte pour retourner`;
    front.innerHTML = "";
    const row = el("div", { style: "display:flex;align-items:center;gap:10px;justify-content:center;" });
    row.appendChild(el("div", { style: "font-size:21px;font-weight:700;color:#1B2A4A;", text: item.en }));
    row.appendChild(speakBtn(item.en));
    front.appendChild(row);
    front.appendChild(el("div", { style: "font-size:12px;color:#8a7455;margin-top:10px;", text: "touche pour voir la traduction · touche 🔊 pour écouter" }));
    back.innerHTML = "";
    back.appendChild(el("div", { style: "font-size:21px;font-weight:700;", text: item.fr }));
    flipped = false;
    cardInner.classList.remove("flipped");
  }
  updateCard();

  const nav = el("div", { style: "display:flex;justify-content:space-between;margin-top:18px;" });
  const prevBtn = el("button", { class: "ghost-btn", text: "← Précédent" });
  prevBtn.addEventListener("click", () => { idx = (idx - 1 + category.words.length) % category.words.length; updateCard(); });
  const nextBtn = el("button", { class: "ghost-btn", text: "Suivant →" });
  nextBtn.addEventListener("click", () => { idx = (idx + 1) % category.words.length; updateCard(); });
  nav.appendChild(prevBtn);
  nav.appendChild(nextBtn);
  c.appendChild(nav);

  const footer = el("div", { style: "margin-top:auto;padding-top:20px;" });
  const quizBtn = el("button", { class: "primary-btn", style: "width:100%;", text: "Faire le quiz de ce chapitre" });
  quizBtn.addEventListener("click", () => navigate("quiz", catId));
  footer.appendChild(quizBtn);
  c.appendChild(footer);

  return c;
}

// --------------------------------------------------------------------------
// Écran Quiz
// --------------------------------------------------------------------------
function buildQuestion(pool) {
  const correctItem = pool[Math.floor(Math.random() * pool.length)];
  const others = pool.filter((it) => it.fr !== correctItem.fr);
  const distractors = [];
  const copy = [...others];
  while (distractors.length < 3 && copy.length > 0) {
    distractors.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0].fr);
  }
  const options = [...distractors, correctItem.fr].sort(() => Math.random() - 0.5);
  return { en: correctItem.en, correct: correctItem.fr, options };
}

function renderQuiz(catId) {
  const category = catId === "__all__" ? null : CATEGORIES.find((c) => c.id === catId);
  const pool = catId === "__all__" ? ALL_WORDS : category.words;
  const title = catId === "__all__" ? "Quiz général" : category.title;
  const TOTAL_ROUNDS = 10;

  let q = buildQuestion(pool);
  let selected = null;
  let score = { correct: 0, total: 0 };
  let round = 1;

  const c = el("div", { class: "ruled", style: "padding:20px 20px 24px 58px;min-height:660px;display:flex;flex-direction:column;" });
  c.appendChild(topBar("Quiz — " + title, () => navigate("home")));
  const meta = el("div", { style: "font-size:13px;color:#5b4a35;margin-bottom:16px;" });
  c.appendChild(meta);
  c.appendChild(el("div", { style: "font-size:12px;color:#8a7455;margin-bottom:6px;", text: "Traduis en français :" }));
  const qRow = el("div", { style: "display:flex;align-items:center;gap:10px;margin-bottom:20px;" });
  c.appendChild(qRow);
  const optionsWrap = el("div", { style: "display:flex;flex-direction:column;gap:10px;" });
  c.appendChild(optionsWrap);
  const footer = el("div", { style: "margin-top:auto;padding-top:20px;" });
  c.appendChild(footer);

  function updateQuestion() {
    meta.textContent = `Question ${round} / ${TOTAL_ROUNDS} · Score : ${score.correct}/${score.total}`;
    qRow.innerHTML = "";
    qRow.appendChild(el("div", { style: "font-size:23px;font-weight:700;color:#1B2A4A;", text: q.en }));
    qRow.appendChild(speakBtn(q.en));
    optionsWrap.innerHTML = "";
    q.options.forEach((opt) => {
      const btn = el("button", { class: "choice-btn", text: opt });
      if (selected) {
        if (opt === q.correct) btn.classList.add("correct");
        else if (opt === selected) btn.classList.add("wrong");
      }
      btn.addEventListener("click", () => pick(opt));
      optionsWrap.appendChild(btn);
    });
    footer.innerHTML = "";
    if (selected) {
      const finished = round >= TOTAL_ROUNDS;
      if (finished) {
        footer.appendChild(el("div", { class: "hand", style: "font-size:17px;color:#1B2A4A;margin-bottom:10px;", text: `Terminé — ${score.correct}/${score.total} bonnes réponses !` }));
      }
      const nextBtn = el("button", { class: "primary-btn", style: "width:100%;", text: finished ? "Recommencer" : "Question suivante" });
      nextBtn.addEventListener("click", nextQuestion);
      footer.appendChild(nextBtn);
    }
  }

  function pick(opt) {
    if (selected) return;
    selected = opt;
    const ok = opt === q.correct;
    recordAnswer(catId, ok);
    score = { correct: score.correct + (ok ? 1 : 0), total: score.total + 1 };
    updateQuestion();
  }

  function nextQuestion() {
    if (round >= TOTAL_ROUNDS) { round = 1; score = { correct: 0, total: 0 }; }
    else round += 1;
    selected = null;
    q = buildQuestion(pool);
    updateQuestion();
  }

  updateQuestion();
  return c;
}

// --------------------------------------------------------------------------
// Écran Constructeur de phrases
// --------------------------------------------------------------------------
function renderBuilder() {
  let patternIdx = 0, verbIdx = 0, objIdx = 0;

  const c = el("div", { class: "ruled", style: "padding:20px 20px 24px 58px;min-height:660px;display:flex;flex-direction:column;" });
  c.appendChild(topBar("Constructeur de phrases", () => navigate("home")));
  c.appendChild(el("div", { style: "font-size:13px;color:#5b4a35;margin-bottom:16px;", text: "Choisis un bloc + un verbe + une précision, et regarde la phrase se construire — c'est l'esprit Michel Thomas : combiner au lieu de mémoriser." }));

  function makeSelect(label, options, renderLabel, onChange) {
    c.appendChild(el("label", { style: "font-size:12.5px;color:#8a7455;margin-bottom:4px;display:block;", text: label }));
    const sel = el("select", { style: "margin-bottom:14px;" });
    options.forEach((opt, i) => {
      const o = el("option", { value: i, text: renderLabel(opt) });
      sel.appendChild(o);
    });
    sel.addEventListener("change", (e) => onChange(Number(e.target.value)));
    c.appendChild(sel);
    return sel;
  }

  makeSelect("Structure (bloc)", PATTERNS, (p) => `${p.en} — ${p.fr}`, (v) => { patternIdx = v; update(); });
  makeSelect("Verbe / action", BUILDER_VERBS, (v) => v, (v) => { verbIdx = v; update(); });
  makeSelect("Précision (optionnel)", BUILDER_OBJECTS, (o) => o || "(rien)", (v) => { objIdx = v; update(); });

  const resultBox = el("div", { style: "background:#fff;border:2px solid #1B2A4A;border-radius:10px;padding:18px;margin-top:auto;" });
  c.appendChild(resultBox);

  function update() {
    const pattern = PATTERNS[patternIdx];
    const verb = BUILDER_VERBS[verbIdx];
    const obj = BUILDER_OBJECTS[objIdx];
    const sentenceEn = `${pattern.en} ${verb}${obj ? " " + obj : ""}.`;
    const sentenceFr = `${pattern.fr} ${verb}${obj ? " " + obj : ""}. (approximatif)`;
    resultBox.innerHTML = "";
    const row = el("div", { style: "display:flex;align-items:center;gap:10px;" });
    row.appendChild(el("div", { style: "font-size:20px;font-weight:700;color:#1B2A4A;", text: sentenceEn }));
    row.appendChild(speakBtn(sentenceEn));
    resultBox.appendChild(row);
    resultBox.appendChild(el("div", { style: "font-size:14px;color:#5b4a35;margin-top:8px;font-style:italic;", text: sentenceFr }));
  }
  update();

  return c;
}

// --------------------------------------------------------------------------
// Démarrage
// --------------------------------------------------------------------------
(async function init() {
  await loadProgress();
  render();
})();
</script>
