// Substitut de window.storage (utilisé normalement dans les artefacts Claude)
// basé sur localStorage, pour que l'application fonctionne hors de Claude.ai
window.storage = {
  async get(key, shared) {
    try {
      const raw = localStorage.getItem('carnet_' + key);
      return raw === null ? null : { key, value: raw, shared: !!shared };
    } catch (e) { return null; }
  },
  async set(key, value, shared) {
    try {
      localStorage.setItem('carnet_' + key, value);
      return { key, value, shared: !!shared };
    } catch (e) { return null; }
  },
  async delete(key, shared) {
    try {
      localStorage.removeItem('carnet_' + key);
      return { key, deleted: true, shared: !!shared };
    } catch (e) { return null; }
  },
  async list(prefix, shared) {
    const p = 'carnet_' + (prefix || '');
    const keys = Object.keys(localStorage).filter(k => k.startsWith(p)).map(k => k.slice(8));
    return { keys, prefix, shared: !!shared };
  }
};
</script>

function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text.replace(/^to\s+/i, ""));
    utter.lang = "en-US";
    utter.rate = 0.9;
    window.speechSynthesis.speak(utter);
  } catch (e) {}
}

function SpeakBtn({ text, size = 20 }) {
  return (
    <button
      onClick={(e) => { e.stopPropagation(); speak(text); }}
      aria-label="Écouter la prononciation"
      style={{
        background: "#1B2A4A", color: "#fff", border: "none", borderRadius: "50%",
        width: size + 16, height: size + 16, display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: size, flexShrink: 0, boxShadow: "0 2px 4px rgba(0,0,0,0.2)",
      }}
    >
      🔊
    </button>
  );
}

function parseCategory(raw) {
  return raw
    .split(",")
    .map((pair) => {
      const [en, fr] = pair.split("|");
      return { en, fr };
    })
    .filter((x) => x.en && x.fr);
}

const CATEGORIES = Object.keys(RAW).map((id) => ({
  id,
  title: TITLES[id],
  words: parseCategory(RAW[id]),
}));

const BUILDER_VERBS = [

const BUILDER_OBJECTS = ["", "today", "tomorrow", "with you", "right now", "this evening", "before Friday"];

const STORAGE_KEY = "carnet-anglais-v2-progress";

function useProgress() {
  const [progress, setProgress] = useState({});
  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        setProgress(res ? JSON.parse(res.value) : {});
      } catch (e) {
        setProgress({});
      }
    })();
  }, []);

  const save = useCallback(async (next) => {
    setProgress(next);
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next), false);
    } catch (e) {}
  }, []);

  const recordAnswer = useCallback(
    (catId, correct) => {
      setProgress((prev) => {
        const cur = prev[catId] || { correct: 0, attempts: 0 };
        const next = {
          ...prev,
          [catId]: { correct: cur.correct + (correct ? 1 : 0), attempts: cur.attempts + 1 },
        };
        save(next);
        return next;
      });
    },
    [save]
  );

  return { progress, recordAnswer };
}

function Stamp({ stats }) {
  if (!stats || !stats.attempts) return null;
  const pct = Math.round((stats.correct / stats.attempts) * 100);
  return (
    <div
      style={{
        width: 40, height: 40, borderRadius: "50%",
        border: `2.5px solid ${pct >= 70 ? "#2F4F3E" : "#C0392B"}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: "'Kalam', cursive", fontWeight: 700, fontSize: 12,
        color: pct >= 70 ? "#2F4F3E" : "#C0392B", transform: "rotate(-8deg)", flexShrink: 0,
      }}
    >
      {pct}%
    </div>
  );
}

        .flip-card { perspective: 1000px; height: 190px; }

        .flip-inner.flipped { transform: rotateY(180deg); }

        .choice-btn.wrong { background: #C0392B; border-color: #C0392B; color: #fff; }

function Flashcards({ category, onBack, onQuiz }) {
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const item = category.words[idx];
  const next = () => { setFlipped(false); setIdx((i) => (i + 1) % category.words.length); };
  const prev = () => { setFlipped(false); setIdx((i) => (i - 1 + category.words.length) % category.words.length); };

  return (
    <div className="ruled" style={{ padding: "20px 20px 24px 58px", minHeight: 660, display: "flex", flexDirection: "column" }}>
      <div className="margin-line" />

          </div>

            <div style={{ fontSize: 21, fontWeight: 700 }}>{item.fr}</div>
          </div>
        </div>
      </div>

        <button className="ghost-btn" onClick={next}>Suivant →</button>
      </div>
      <div style={{ marginTop: "auto", paddingTop: 20 }}>
        <button className="primary-btn" style={{ width: "100%" }} onClick={onQuiz}>Faire le quiz de ce chapitre</button>
      </div>
    </div>
  );
}

function buildQuestion(pool) {
  const correctItem = pool[Math.floor(Math.random() * pool.length)];
  const others = pool.filter((it) => it.fr !== correctItem.fr);
  const distractors = [];
  const copy = [...others];
  while (distractors.length < 3 && copy.length > 0) {
    distractors.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0].fr);
  }
  const options = [...distractors, correctItem.fr].sort(() => Math.random() - 0.5);
  return { en: correctItem.en, correct: correctItem.fr, options };
}

function Quiz({ title, pool, catKey, onAnswer, onBack }) {
  const [q, setQ] = useState(() => buildQuestion(pool));
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [round, setRound] = useState(1);
  const TOTAL_ROUNDS = 10;

  const pick = (opt) => {
    if (selected) return;
    setSelected(opt);
    const ok = opt === q.correct;
    onAnswer(catKey, ok);
    setScore((s) => ({ correct: s.correct + (ok ? 1 : 0), total: s.total + 1 }));
  };

  const next = () => {
    if (round >= TOTAL_ROUNDS) { setRound(1); setScore({ correct: 0, total: 0 }); }
    else setRound((r) => r + 1);
    setSelected(null);
    setQ(buildQuestion(pool));
  };

  const finished = selected && round >= TOTAL_ROUNDS;

  return (
    <div className="ruled" style={{ padding: "20px 20px 24px 58px", minHeight: 660, display: "flex", flexDirection: "column" }}>
      <div className="margin-line" />
      <TopBar title={`Quiz — ${title}`} onBack={onBack} />
      <div style={{ fontSize: 13, color: "#5b4a35", marginBottom: 16 }}>
        Question {round} / {TOTAL_ROUNDS} · Score : {score.correct}/{score.total}
      </div>
      <div style={{ fontSize: 12, color: "#8a7455", marginBottom: 6 }}>Traduis en français :</div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
        <div style={{ fontSize: 23, fontWeight: 700, color: "#1B2A4A" }}>{q.en}</div>
        <SpeakBtn text={q.en} size={16} />
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {q.options.map((opt) => {
          let cls = "choice-btn";
          if (selected) {
            if (opt === q.correct) cls += " correct";
            else if (opt === selected) cls += " wrong";
          }
          return <button key={opt} className={cls} onClick={() => pick(opt)}>{opt}</button>;
        })}
      </div>
      {selected && (
        <div style={{ marginTop: "auto", paddingTop: 20 }}>
          {finished && (
            <div style={{ fontFamily: "'Kalam', cursive", fontSize: 17, color: "#1B2A4A", marginBottom: 10 }}>
              Terminé — {score.correct}/{score.total} bonnes réponses !
            </div>
          )}
          <button className="primary-btn" style={{ width: "100%" }} onClick={next}>
            {finished ? "Recommencer" : "Question suivante"}
          </button>
        </div>
      )}
    </div>
  );
}

function Builder({ onBack }) {
  const [patternIdx, setPatternIdx] = useState(0);
  const [verbIdx, setVerbIdx] = useState(0);
  const [objIdx, setObjIdx] = useState(0);
  const pattern = PATTERNS[patternIdx];
  const verb = BUILDER_VERBS[verbIdx];
  const obj = BUILDER_OBJECTS[objIdx];

  const sentenceEn = `${pattern.en} ${verb}${obj ? " " + obj : ""}.`;
  const sentenceFr = `${pattern.fr} ${verb}${obj ? " " + obj : ""}. (approximatif)`;

  return (
    <div className="ruled" style={{ padding: "20px 20px 24px 58px", minHeight: 660, display: "flex", flexDirection: "column" }}>
      <div className="margin-line" />
      <TopBar title="Constructeur de phrases" onBack={onBack} />
      <div style={{ fontSize: 13, color: "#5b4a35", marginBottom: 16 }}>
        Choisis un bloc + un verbe + une précision, et regarde la phrase se construire — c'est l'esprit Michel Thomas : combiner au lieu de mémoriser.
      </div>

      <label style={{ fontSize: 12.5, color: "#8a7455", marginBottom: 4 }}>Structure (bloc)</label>
      <select value={patternIdx} onChange={(e) => setPatternIdx(Number(e.target.value))} style={{ marginBottom: 14 }}>
        {PATTERNS.map((p, i) => <option key={i} value={i}>{p.en} — {p.fr}</option>)}
      </select>

      <label style={{ fontSize: 12.5, color: "#8a7455", marginBottom: 4 }}>Verbe / action</label>
      <select value={verbIdx} onChange={(e) => setVerbIdx(Number(e.target.value))} style={{ marginBottom: 14 }}>
        {BUILDER_VERBS.map((v, i) => <option key={i} value={i}>{v}</option>)}
      </select>

      <label style={{ fontSize: 12.5, color: "#8a7455", marginBottom: 4 }}>Précision (optionnel)</label>
      <select value={objIdx} onChange={(e) => setObjIdx(Number(e.target.value))} style={{ marginBottom: 18 }}>
        {BUILDER_OBJECTS.map((o, i) => <option key={i} value={i}>{o || "(rien)"}</option>)}
      </select>

      <div style={{ background: "#fff", border: "2px solid #1B2A4A", borderRadius: 10, padding: 18, marginTop: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 20, fontWeight: 700, color: "#1B2A4A" }}>{sentenceEn}</div>
          <SpeakBtn text={sentenceEn} size={16} />
        </div>
        <div style={{ fontSize: 14, color: "#5b4a35", marginTop: 8, fontStyle: "italic" }}>{sentenceFr}</div>
      </div>
    </div>
  );
}

function TopBar({ title, onBack }) {

    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
      <button className="ghost-btn" style={{ padding: "6px 12px", fontSize: 13 }} onClick={onBack}>← Carnet</button>
      <div style={{ fontFamily: "'Kalam', cursive", fontSize: 17, fontWeight: 700, color: "#1B2A4A" }}>{title}</div>
      <div style={{ width: 70 }} />
    </div>
  );
}
